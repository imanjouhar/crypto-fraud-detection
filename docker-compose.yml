services:
  api:
    build: .
    container_name: aml-api
    ports:
      - "5000:5000"
    environment:
      - API_KEY=aml-secret-key-2024
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  sender:
    build: .
    container_name: aml-sender
    command: python main.py send
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:5000
      - API_KEY=aml-secret-key-2024
